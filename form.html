<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dar Aplauso — Cemaco</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<script src="https://res.cdn.office.net/teams-js/2.19.0/js/MicrosoftTeams.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background:#f5f5f5;
    color:#1a1a1a;
    padding: 24px 16px 60px;
  }
  .card {
    background:white;
    max-width:520px;
    margin:0 auto;
    border-radius:12px;
    padding:28px 24px;
    box-shadow:0 2px 12px rgba(0,0,0,0.06);
  }
  h1 {
    font-size:22px;
    color:#0F3B7A;
    margin-bottom:6px;
  }
  .subtitle {
    font-size:13px;
    color:#777;
    margin-bottom:24px;
  }
  label {
    display:block;
    font-size:13px;
    font-weight:700;
    color:#333;
    margin-bottom:6px;
    margin-top:18px;
  }
  select, textarea, input[type=text] {
    width:100%;
    padding:11px 12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
    font-family:inherit;
    background:#fafafa;
  }
  textarea { resize:vertical; min-height:90px; }
  .search-wrap { position:relative; }
  #reconocidoResultados {
    position:absolute;
    top:calc(100% + 4px);
    left:0; right:0;
    background:white;
    border:1px solid #ddd;
    border-radius:8px;
    max-height:220px;
    overflow-y:auto;
    z-index:10;
    box-shadow:0 4px 14px rgba(0,0,0,0.1);
    display:none;
  }
  #reconocidoResultados.show { display:block; }
  .resultado-item {
    padding:10px 12px;
    cursor:pointer;
    font-size:13.5px;
    border-bottom:1px solid #f0f0f0;
  }
  .resultado-item:last-child { border-bottom:none; }
  .resultado-item:hover { background:#EEF3FB; }
  .resultado-item .dept { color:#999; font-size:11.5px; }
  #reconocidoSeleccionado {
    margin-top:8px;
    background:#EEF3FB;
    border:1px solid #0F3B7A;
    border-radius:8px;
    padding:10px 12px;
    font-size:13.5px;
    display:none;
    align-items:center;
    justify-content:space-between;
  }
  #reconocidoSeleccionado.show { display:flex; }
  #reconocidoSeleccionado button {
    background:none; border:none; color:#E8372A; font-weight:700; cursor:pointer; font-size:13px;
  }
  .valores-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:8px;
  }
  .valor-opt {
    display:flex;
    align-items:center;
    gap:8px;
    background:#f5f5f5;
    padding:10px;
    border-radius:8px;
    font-size:12.5px;
    cursor:pointer;
    border:2px solid transparent;
  }
  .valor-opt.selected {
    border-color:#0F3B7A;
    background:#EEF3FB;
  }
  .valor-opt input { width:auto; }
  #btnSubmit {
    width:100%;
    margin-top:26px;
    background:#0F3B7A;
    color:white;
    border:none;
    padding:14px;
    border-radius:8px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
  }
  #btnSubmit:disabled { opacity:0.5; cursor:not-allowed; }
  #status {
    margin-top:14px;
    font-size:13px;
    text-align:center;
  }
  .status-ok { color:#2E9E4F; font-weight:700; }
  .status-err { color:#E8372A; font-weight:700; }
  #loginScreen {
    max-width:520px;
    margin:80px auto;
    text-align:center;
  }
  #loginScreen button {
    background:#0F3B7A;
    color:white;
    border:none;
    padding:12px 28px;
    border-radius:8px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    margin-top:16px;
  }
</style>
</head>
<body>

<div id="loginScreen">
  <h1>👏 Mención Aplauso</h1>
  <p class="subtitle">Inicia sesión con tu cuenta de Cemaco para continuar</p>
  <button onclick="login()">Iniciar sesión</button>
</div>

<div class="card" id="formCard" style="display:none">
  <h1>👏 Mención Aplauso</h1>
  <p class="subtitle" id="userGreeting"></p>

  <label>Nombre del Reconocido *</label>
  <div class="search-wrap">
    <input type="text" id="reconocidoBusqueda" placeholder="Escribe el nombre (mínimo 3 letras)" autocomplete="off">
    <div id="reconocidoResultados"></div>
  </div>
  <div id="reconocidoSeleccionado">
    <span id="reconocidoSeleccionadoTexto"></span>
    <button onclick="limpiarSeleccion()">Quitar</button>
  </div>

  <label>Departamento del Reconocido *</label>
  <select id="departamento">
    <option value="">Selecciona...</option>
  </select>

  <label>Valor Observado *</label>
  <div class="valores-grid" id="valoresGrid"></div>

  <label>¡Gracias por vivir nuestros valores! *</label>
  <textarea id="motivo" placeholder="Comparte con el homenajeado porqué le entregas este aplauso"></textarea>

  <button id="btnSubmit" onclick="enviarAplauso()">Enviar Aplauso 👏</button>
  <div id="status"></div>
</div>

<script>
// ── Config MSAL ──
const msalConfig = {
  auth: {
    clientId: "8e2a17cb-e0dc-4166-998a-96298e04704e",
    authority: "https://login.microsoftonline.com/7944ce02-7df9-4a4a-97ac-85a2b2f936cb",
    redirectUri: "https://jdaetzcemaco.github.io/aplausos/form.html"
  },
  cache: { cacheLocation: "sessionStorage" }
};
let currentAccount = null;
let accessToken = null;
let msalInstance = null;

function getMsalInstance() {
  if (typeof msal === "undefined") {
    throw new Error("La librería MSAL no cargó. Verifica tu conexión a internet o si hay un bloqueo de red.");
  }
  if (!msalInstance) {
    msalInstance = new msal.PublicClientApplication(msalConfig);
  }
  return msalInstance;
}

let personaSeleccionada = null;
let debounceTimer = null;

const DEPARTAMENTOS = [
  "Auditoría Interna",
  "Business Intelligence",
  "Categorías",
  "Compras Ferretería",
  "Compras Hogar",
  "Compras Qbrands",
  "Contabilidad",
  "Contraloría",
  "Control y Prevención",
  "Finanzas",
  "Futuro Verde",
  "Constru CEMACO",
  "Importaciones",
  "Informática",
  "Informática Desarrollo",
  "Legal",
  "Logística",
  "Mercadeo",
  "Merchandising",
  "Operaciones",
  "Presidencia",
  "Pricing",
  "Producto",
  "Proyecto Mejora Continua",
  "Proyectos",
  "Recompra",
  "Recursos Humanos",
  "Sostenibilidad",
  "SAE",
  "Venta en Línea"
];

const VALORES = [
  { key: "Hacemos lo correcto", color: "#0F3B7A" },
  { key: "En equipo ganamos", color: "#E8372A" },
  { key: "Mejoramos todo el tiempo", color: "#2E9E4F" },
  { key: "Somos ágiles y apasionados", color: "#F5A623" },
  { key: "Cumplimos", color: "#8B2FC9" },
  { key: "Obsesionados por ayudar al cliente", color: "#0095D9" }
];

// URL del flujo de Power Automate (HTTP trigger) — se agrega cuando esté listo
const POWER_AUTOMATE_URL = "https://default7944ce027df94a4a97ac85a2b2f936.cb.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/19/workflows/400b225dae0f431da453ccab3f3ed75a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=bzXSEPIBinqg6x69JgQVI9sbpMcxhUzP_SwMYZ2hS20";
const CLAVE_SECRETA = "aplausos-cemaco-2026";

async function intentarTeamsSSO() {
  try {
    if (typeof microsoftTeams === "undefined") return false;
    await microsoftTeams.app.initialize();
    const context = await microsoftTeams.app.getContext();
    const loginHint = context.user && context.user.userPrincipalName;
    if (!loginHint) return false;

    const instance = getMsalInstance();
    await instance.initialize();
    const result = await instance.ssoSilent({
      scopes: ["User.Read.All"],
      loginHint: loginHint
    });
    currentAccount = result.account;
    accessToken = result.accessToken;
    mostrarFormulario();
    return true;
  } catch (e) {
    return false;
  }
}

window.onload = async () => {
  try {
    const ssoOk = await intentarTeamsSSO();
    if (ssoOk) return;

    const instance = getMsalInstance();
    await instance.initialize();
    const accounts = instance.getAllAccounts();
    if (accounts.length > 0) {
      currentAccount = accounts[0];
      await getToken();
      mostrarFormulario();
    }
  } catch (e) {
    document.getElementById("loginScreen").innerHTML =
      '<h1>👏 Mención Aplauso</h1><p class="subtitle" style="color:#E8372A">' + e.message + '</p>';
  }
};

async function login() {
  try {
    const instance = getMsalInstance();
    await instance.initialize();
    const result = await instance.loginPopup({ scopes: ["User.Read.All"] });
    currentAccount = result.account;
    await getToken();
    mostrarFormulario();
  } catch (e) {
    alert("Error al iniciar sesión: " + e.message + ". Si estás en Teams de escritorio, intenta abrir el formulario en tu navegador normal.");
  }
}

async function getToken() {
  const request = {
    scopes: ["User.Read.All"],
    account: currentAccount
  };
  const instance = getMsalInstance();
  try {
    const result = await instance.acquireTokenSilent(request);
    accessToken = result.accessToken;
  } catch (e) {
    const result = await instance.acquireTokenPopup(request);
    accessToken = result.accessToken;
  }
}

function mostrarFormulario() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("formCard").style.display = "block";
  document.getElementById("userGreeting").textContent = "Sesión: " + currentAccount.name;

  document.getElementById("reconocidoBusqueda").addEventListener("input", (e) => {
    clearTimeout(debounceTimer);
    const texto = e.target.value.trim();
    if (texto.length < 3) {
      document.getElementById("reconocidoResultados").classList.remove("show");
      return;
    }
    debounceTimer = setTimeout(() => buscarEmpleados(texto), 300);
  });

  const depSelect = document.getElementById("departamento");
  DEPARTAMENTOS.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d;
    opt.textContent = d;
    depSelect.appendChild(opt);
  });

  const grid = document.getElementById("valoresGrid");
  VALORES.forEach((v, i) => {
    const div = document.createElement("div");
    div.className = "valor-opt";
    div.innerHTML = `<input type="checkbox" value="${v.key}" id="val${i}"> <label for="val${i}" style="margin:0;font-weight:600;color:${v.color}">${v.key}</label>`;
    div.onclick = (e) => {
      if (e.target.tagName !== "INPUT") {
        const cb = div.querySelector("input");
        cb.checked = !cb.checked;
      }
      div.classList.toggle("selected", div.querySelector("input").checked);
    };
    grid.appendChild(div);
  });
}

async function buscarEmpleados(texto) {
  const resultadosDiv = document.getElementById("reconocidoResultados");
  resultadosDiv.innerHTML = '<div class="resultado-item">Buscando...</div>';
  resultadosDiv.classList.add("show");

  try {
    const search = encodeURIComponent(`"displayName:${texto}"`);
    const resp = await fetch(
      `https://graph.microsoft.com/v1.0/users?$search=${search}&$select=displayName,mail,department,accountEnabled&$top=15`,
      {
        headers: {
          Authorization: `Bearer ${accessToken}`,
          ConsistencyLevel: "eventual"
        }
      }
    );
    const data = await resp.json();
    const usuarios = (data.value || []).filter(u => u.accountEnabled !== false);

    if (usuarios.length === 0) {
      resultadosDiv.innerHTML = '<div class="resultado-item">Sin resultados</div>';
      return;
    }

    resultadosDiv.innerHTML = "";
    usuarios.forEach(u => {
      const item = document.createElement("div");
      item.className = "resultado-item";
      item.innerHTML = `${u.displayName}<br><span class="dept">${u.mail || ""} ${u.department ? "· " + u.department : ""}</span>`;
      item.onclick = () => seleccionarPersona(u);
      resultadosDiv.appendChild(item);
    });
  } catch (e) {
    resultadosDiv.innerHTML = '<div class="resultado-item">Error al buscar</div>';
  }
}

function seleccionarPersona(u) {
  personaSeleccionada = u;
  document.getElementById("reconocidoBusqueda").value = "";
  document.getElementById("reconocidoResultados").classList.remove("show");
  document.getElementById("reconocidoSeleccionadoTexto").textContent = `${u.displayName} (${u.mail || "sin correo"})`;
  document.getElementById("reconocidoSeleccionado").classList.add("show");
  document.getElementById("reconocidoBusqueda").style.display = "none";
}

function limpiarSeleccion() {
  personaSeleccionada = null;
  document.getElementById("reconocidoSeleccionado").classList.remove("show");
  document.getElementById("reconocidoBusqueda").style.display = "block";
  document.getElementById("reconocidoBusqueda").value = "";
}

async function enviarAplauso() {
  const departamento = document.getElementById("departamento").value.trim();
  const valores = Array.from(document.querySelectorAll("#valoresGrid input:checked")).map(i => i.value);
  const motivo = document.getElementById("motivo").value.trim();
  const statusDiv = document.getElementById("status");

  if (!personaSeleccionada || !departamento || valores.length === 0 || !motivo) {
    statusDiv.innerHTML = '<span class="status-err">Completa todos los campos, incluyendo la búsqueda del reconocido</span>';
    return;
  }

  const btn = document.getElementById("btnSubmit");
  btn.disabled = true;
  statusDiv.textContent = "Enviando...";

  const payload = {
    clave: CLAVE_SECRETA,
    DepartamentoDelReconocido: departamento,
    NombreDelReconocido: personaSeleccionada.displayName,
    CorreoDelReconocido: personaSeleccionada.mail,
    ValorObservado: valores.join(", "),
    Motivo: motivo,
    NombreDeQuienReconoce: currentAccount.name,
    CorreoDeQuienReconoce: currentAccount.username
  };

  try {
    const resp = await fetch(POWER_AUTOMATE_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    if (!resp.ok) throw new Error("Error " + resp.status);
    statusDiv.innerHTML = '<span class="status-ok">¡Aplauso enviado! 👏</span>';
    document.getElementById("motivo").value = "";
    document.getElementById("departamento").value = "";
    limpiarSeleccion();
    document.querySelectorAll("#valoresGrid input").forEach(i => i.checked = false);
    document.querySelectorAll(".valor-opt").forEach(d => d.classList.remove("selected"));
  } catch (e) {
    statusDiv.innerHTML = '<span class="status-err">Error al enviar. Intenta de nuevo.</span>';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
